<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Pink Cow</title>
<style>
:root {
  --bg: #00101c;
  --surface: #00101c;
  --surface-2: #002a45;
  --border: #003a5c;
  --text: #ffffff;
  --muted: #6b90a8;
  --accent: #005016;
  --accent-bright: #007a20;
  --accent-light: rgba(0,106,20,.18);
  --danger: #e05555;
  --warn: #c89a30;
  --warn-light: rgba(200,154,48,.15);
  --shadow: 0 1px 4px rgba(0,0,0,.4), 0 4px 20px rgba(0,0,0,.3);
  --r: 12px;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
html, body { min-height: 100%; background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
body { display: flex; flex-direction: column; align-items: center; min-height: 100svh; }

/* bar */
.bar { width: 100%; background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 12px 20px; display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 10; }
.bar .logo-img { height: 32px; width: auto; object-fit: contain; display: block; }
.bar .logo-text { font-size: 15px; font-weight: 700; color: var(--text); }
.bar .room-pill { margin-left: auto; font-size: 13px; font-weight: 700;
  letter-spacing: .12em; background: var(--accent-light); color: var(--accent-bright);
  border: 1px solid var(--accent); padding: 4px 12px; border-radius: 20px; }

/* screen */
.screen { width: 100%; max-width: 460px; padding: 20px; flex: 1;
  display: flex; flex-direction: column; gap: 14px; }

/* card */
.card { background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 20px; box-shadow: var(--shadow); }
.card-label { font-size: 11px; font-weight: 600; letter-spacing: .08em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.card h2 { font-size: 18px; font-weight: 700; line-height: 1.3;
  margin-bottom: 12px; color: var(--text); }

/* inputs */
input[type=text] { width: 100%; padding: 13px 15px; border: 1.5px solid var(--border);
  border-radius: 9px; font-size: 16px; background: var(--surface-2); outline: none;
  transition: border-color .15s; color: var(--text); font-family: inherit; }
input[type=text]:focus { border-color: var(--accent-bright); }
input[type=text]::placeholder { color: var(--muted); }

/* buttons */
.btn { display: block; width: 100%; padding: 14px 18px; border: none;
  border-radius: 9px; font-size: 16px; font-weight: 600; cursor: pointer;
  transition: opacity .1s, transform .1s; font-family: inherit; }
.btn:active { transform: scale(.98); opacity: .85; }
.btn:disabled { opacity: .3; pointer-events: none; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-bright); }
.btn-dark { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
.btn-ghost { background: transparent; color: var(--text); border: 1.5px solid var(--border); }
.btn-sm { font-size: 13px; padding: 8px 14px; width: auto;
  display: inline-block; border-radius: 7px; }

/* question display */
.q-text { font-size: 21px; font-weight: 700; line-height: 1.35;
  color: var(--text); padding: 16px 0 4px; }

/* player rows */
.player-list { display: flex; flex-direction: column; gap: 8px; }
.p-row { display: flex; align-items: center; gap: 10px; padding: 11px 14px;
  background: var(--surface-2); border: 1px solid var(--border); border-radius: 9px; }
.p-row .pname { font-weight: 600; flex: 1; font-size: 15px; color: var(--text); }
.p-row .pscore { font-size: 20px; font-weight: 700; color: var(--accent-bright);
  min-width: 28px; text-align: right; }
.p-row .cow { font-size: 16px; }
.p-row.me { border-color: var(--accent-bright); background: var(--accent-light); }
.p-row.winner { border-color: var(--accent-bright); background: var(--accent-light); }
.p-row .delta { font-size: 12px; font-weight: 600; color: var(--accent-bright); }

/* waiting dots */
.dots span { animation: blink 1.2s infinite; }
.dots span:nth-child(2) { animation-delay: .2s; }
.dots span:nth-child(3) { animation-delay: .4s; }
@keyframes blink { 0%,80%,100% { opacity: .2 } 40% { opacity: 1 } }

/* answer reveal */
.reveal-stream { display: flex; flex-direction: column; gap: 12px; }
.answer-card { background: var(--surface-2); border: 1px solid var(--border);
  border-radius: var(--r); padding: 16px 18px;
  opacity: 0; transform: translateY(14px);
  transition: opacity .4s ease, transform .4s ease; }
.answer-card.visible { opacity: 1; transform: none; }
.answer-card .ac-name { font-size: 12px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
.answer-card .ac-answer { font-size: 22px; font-weight: 700; color: var(--text);
  opacity: 0; transform: translateY(4px);
  transition: opacity .35s ease .5s, transform .35s ease .5s; }
.answer-card.visible .ac-answer { opacity: 1; transform: none; }
.answer-card.match { border-color: var(--accent-bright); background: var(--accent-light); }
.answer-card.solo { border-color: var(--warn); background: var(--warn-light); }

/* summary groups */
.groups { display: flex; flex-direction: column; gap: 10px; }
.group { border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.group.top { border-color: var(--accent-bright); }
.group.solo-g { border-color: var(--warn); }
.group-head { display: flex; align-items: center; padding: 10px 14px;
  background: var(--surface-2); font-weight: 700; font-size: 15px;
  gap: 8px; color: var(--text); }
.group.top .group-head { background: var(--accent-light); color: var(--accent-bright); }
.group.solo-g .group-head { background: var(--warn-light); color: var(--warn); }
.group-count { margin-left: auto; font-size: 12px; background: var(--border);
  padding: 2px 9px; border-radius: 20px; font-weight: 600; color: var(--text); }
.group-entries { padding: 10px 14px; display: flex; flex-direction: column;
  gap: 6px; background: var(--surface); }
.gentry { display: flex; align-items: center; gap: 10px; font-size: 14px; }
.gentry .gname { font-weight: 600; min-width: 80px; color: var(--muted); }
.gentry .gtext { color: var(--text); }
.merge-btn { margin-left: auto; font-size: 12px; padding: 4px 10px;
  background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px;
  cursor: pointer; color: var(--muted); font-family: inherit; transition: background .1s; }
.merge-btn:hover { background: var(--border); color: var(--text); }
.merge-btn.armed { background: var(--warn-light); border-color: var(--warn); color: var(--warn); }

/* merge hint banner */
.merge-banner { background: var(--warn-light); border: 1px solid var(--warn);
  border-radius: 9px; padding: 10px 14px; font-size: 13px; color: var(--warn);
  display: flex; align-items: center; gap: 8px; }
.merge-banner button { margin-left: auto; background: none; border: none;
  cursor: pointer; color: var(--muted); font-size: 16px; }

/* pills */
.pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px;
  border-radius: 20px; font-size: 13px; font-weight: 600; }
.pill-ok { background: var(--accent-light); color: var(--accent-bright); }
.pill-warn { background: var(--warn-light); color: var(--warn); }
.pill-muted { background: var(--surface-2); color: var(--muted); border: 1px solid var(--border); }

/* misc */
.center { text-align: center; }
.gap { display: flex; flex-direction: column; gap: 10px; }
.row { display: flex; gap: 8px; }
.muted { color: var(--muted); }
.progress { font-size: 13px; color: var(--muted); }
.hidden { display: none !important; }
.big { font-size: 48px; text-align: center; padding: 8px 0; }

/* Help button + rules overlay */
.help-btn { width: 30px; height: 30px; flex-shrink: 0; border-radius: 50%;
  border: 1.5px solid var(--border); background: var(--surface-2); color: var(--text);
  font-size: 15px; font-weight: 700; cursor: pointer; }
.help-btn:active { transform: scale(.9); }
.bar .room-pill.hidden ~ .help-btn { margin-left: auto; }

.rules-overlay { position: fixed; inset: 0; background: rgba(0,8,16,.78);
  display: none; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
.rules-overlay.show { display: flex; }
.rules-modal { background: var(--surface-2); border: 1px solid var(--border); border-radius: 14px;
  max-width: 520px; width: 100%; max-height: 90dvh; overflow-y: auto; padding: 22px;
  box-shadow: var(--shadow); }
.rules-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.rules-head h2 { font-size: 18px; color: var(--text); }
.rules-x { background: none; border: none; font-size: 18px; color: var(--muted); cursor: pointer; }
.rules-body { font-size: 14.5px; line-height: 1.6; color: #dce8f0; margin-bottom: 16px; }
.rules-body h4 { color: #ff8fc8; font-size: 15px; margin: 16px 0 6px; }
.rules-body h4:first-child { margin-top: 0; }
.rules-body p { margin-bottom: 9px; }
.rules-body ul { margin: 0 0 10px 18px; }
.rules-body li { margin-bottom: 6px; }
.rules-body .cow { display: inline-block; background: rgba(255,143,200,.16);
  border: 1px solid #ff8fc8; color: #ff8fc8; border-radius: 6px; padding: 1px 7px; font-weight: 700; }
.rules-body .ex { background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 9px 12px; margin: 7px 0; font-size: 13.5px; color: #bcd0de; }
.rules-body strong { color: var(--text); }
</style>
</head>
<body>

<div class="bar">
  <!-- Logo: drop your PNG as logo.png next to client.html, or change the src below -->
  <img src="logo.png" class="logo-img" alt="Pink Cow"
    onerror="this.style.display='none';document.getElementById('logoText').style.display='block'"/>
  <span class="logo-text hidden" id="logoText">Pink Cow 🐄</span>
  <div class="room-pill hidden" id="barRoom"></div>
  <button class="help-btn" onclick="openRules()" title="How to play">?</button>
</div>

<div class="screen" id="screen"></div>

<!-- RULES OVERLAY -->
<div class="rules-overlay" id="rulesOverlay" onclick="closeRules(event)">
  <div class="rules-modal" onclick="event.stopPropagation()">
    <div class="rules-head">
      <h2>🐄 How to Play Pink Cow</h2>
      <button class="rules-x" onclick="closeRules()">✕</button>
    </div>
    <div class="rules-body" id="pinkCowRulesBody"></div>
    <button class="btn btn-primary" onclick="closeRules()">Got it</button>
  </div>
</div>

<script>
const screen = document.getElementById('screen');
const barRoom = document.getElementById('barRoom');

// ── Rules / How to Play (accurate to this implementation) ──
function openRules() {
  document.getElementById('pinkCowRulesBody').innerHTML = PINK_COW_RULES;
  document.getElementById('rulesOverlay').classList.add('show');
}
function closeRules(e) {
  if (e && e.target && e.target.id !== 'rulesOverlay' && e.type === 'click') return;
  document.getElementById('rulesOverlay').classList.remove('show');
}
const PINK_COW_RULES = `
  <h4>The idea</h4>
  <p>Think like the herd. Every round you answer an open question — you score by matching
  the <strong>most popular answer</strong>, and you want to avoid being the <em>only</em>
  one who said something, or you'll get stuck with the Pink Cow.</p>

  <h4>Each round</h4>
  <ul>
    <li>Everyone sees the same question and types a short answer.</li>
    <li>Once all answers are in, matching answers are grouped together. The host can
        merge answers that obviously mean the same thing.</li>
  </ul>

  <h4>Scoring</h4>
  <ul>
    <li>The <strong>single largest group</strong> — the clear majority — each earns
        <strong>+1 point</strong>.</li>
    <li>If two or more groups tie for largest, <strong>nobody scores</strong> that round.</li>
  </ul>
  <div class="ex">Q: "Name a pizza topping." If 4 people say pepperoni, 2 say mushroom,
  and 1 says pineapple — the 4 pepperoni players each score, and the pineapple player is
  alone…</div>

  <h4>The Pink Cow 🐄</h4>
  <p>Any player who gives a <strong>unique answer</strong> (a group of one) is handed the
  <span class="cow">Pink Cow</span>. It passes to a new solo player whenever someone else
  ends up alone. The cow isn't worth points — it's a liability:</p>
  <ul>
    <li>While you hold the cow you <strong>can't win</strong>, even if your score is highest.</li>
    <li>So blend in with the herd, and make sure someone else becomes the odd one out to
        take the cow off your hands.</li>
  </ul>

  <h4>Winning</h4>
  <p>The first player <strong>without the cow</strong> to reach <strong>8 points</strong>
  wins. If the top eligible players are tied at the target, the goal nudges up by one and
  play continues until someone breaks ahead. 🏆</p>
`;
let ws = null;
let S = {
  state: 'join', myId: null, myName: '', isHost: false,
  roomCode: '', players: [], hostId: null,
  question: '', round: 0, myAnswer: '',
  answered: 0, needed: 0,
  groups: [], lastResult: null, winTarget: 8,
  revealDone: false, mergeFirst: null,
};

function render() {
  ({ join, lobby, answering, waiting, revealing, summary, result, gameover }
    [S.state] || join)();
}

/* ---- JOIN ---------------------------------------------------------------- */
function join() {
  barRoom.classList.add('hidden');
  screen.innerHTML = `
    <div class="center" style="padding:24px 0 8px">
      <img src="logo.png" style="max-height:80px;max-width:220px;object-fit:contain"
        alt="Pink Cow" onerror="this.outerHTML='<div style=&quot;font-size:52px&quot;>🐄</div>'"/>
    </div>
    <div class="card">
      <h2>Pink Cow</h2>
      <p class="muted" style="font-size:14px;margin-bottom:18px">
        Think like the herd. Don't be the odd one out.
      </p>
      <div class="gap">
        <input type="text" id="nameIn" placeholder="Your name" maxlength="20" autocomplete="off"/>
        <button class="btn btn-primary" onclick="doCreate()">Create room</button>
        <div class="row">
          <input type="text" id="codeIn" placeholder="Room code" maxlength="4"
            style="text-transform:uppercase;letter-spacing:.15em;font-weight:700;text-align:center;flex:1"/>
          <button class="btn btn-dark btn-sm" onclick="doJoin()" style="white-space:nowrap;align-self:stretch">Join</button>
        </div>
        <div id="joinErr" style="color:var(--danger);font-size:13px;min-height:16px"></div>
      </div>
    </div>`;
  setTimeout(() => document.getElementById('nameIn')?.focus(), 50);
  document.getElementById('nameIn').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('codeIn').value ? doJoin() : doCreate();
  });
  document.getElementById('codeIn').addEventListener('keydown', e => { if (e.key === 'Enter') doJoin(); });
  document.getElementById('codeIn').addEventListener('input', e => { e.target.value = e.target.value.toUpperCase(); });
}

function doCreate() {
  const name = document.getElementById('nameIn').value.trim();
  if (!name) { showErr('Enter your name first'); return; }
  S.myName = name;
  connect(() => send({ type: 'createRoom', name, playerId: S.myId }));
}
function doJoin() {
  const name = document.getElementById('nameIn').value.trim();
  const code = document.getElementById('codeIn').value.trim().toUpperCase();
  if (!name) { showErr('Enter your name first'); return; }
  if (!code) { showErr('Enter a room code'); return; }
  S.myName = name;
  connect(() => send({ type: 'joinRoom', name, code, playerId: S.myId }));
}
function showErr(msg) {
  const el = document.getElementById('joinErr');
  if (el) el.textContent = msg; else console.error(msg);
}

/* ---- LOBBY --------------------------------------------------------------- */
function lobby() {
  barRoom.classList.remove('hidden');
  barRoom.textContent = S.roomCode;
  const canStart = S.isHost && S.players.length >= 2;
  screen.innerHTML = `
    <div class="card">
      <div class="card-label">Room code</div>
      <div style="font-size:36px;font-weight:800;letter-spacing:.2em;color:var(--text);margin-bottom:4px">${S.roomCode}</div>
      <div class="muted" style="font-size:13px">Share this with friends to join</div>
    </div>
    <div class="card">
      <div class="card-label">Players (${S.players.length})</div>
      <div class="player-list">
        ${S.players.map(p => `
          <div class="p-row${p.id === S.myId ? ' me' : ''}">
            <span class="pname">${esc(p.name)}${p.id === S.hostId ? ' 👑' : ''}</span>
          </div>`).join('')}
      </div>
    </div>
    ${S.isHost ? `
      <button class="btn btn-primary" onclick="send({type:'startGame'})"
        ${canStart ? '' : 'disabled'}>
        ${canStart ? 'Start game' : 'Waiting for more players…'}
      </button>` : `
      <div class="card center muted" style="font-size:14px">
        Waiting for host to start
        <span class="dots"> <span>.</span><span>.</span><span>.</span></span>
      </div>`}`;
}

/* ---- ANSWERING ----------------------------------------------------------- */
function answering() {
  screen.innerHTML = `
    <div class="card">
      <div class="card-label">Round ${S.round}</div>
      <div class="q-text">${esc(S.question)}</div>
    </div>
    <div class="card">
      <div class="card-label">Your answer</div>
      <p class="muted" style="font-size:13px;margin-bottom:12px">
        Write what you think <em>most players</em> will also write.
      </p>
      <div class="gap">
        <input type="text" id="ansIn" placeholder="Type your answer…"
          maxlength="60" autocomplete="off" autocorrect="off" spellcheck="false"/>
        <button class="btn btn-primary" id="subBtn" onclick="submitAnswer()" disabled>
          Lock in answer
        </button>
      </div>
    </div>
    <div class="card">${scoreboard()}</div>`;
  const inp = document.getElementById('ansIn');
  setTimeout(() => inp?.focus(), 50);
  inp.addEventListener('input', () => {
    document.getElementById('subBtn').disabled = !inp.value.trim();
  });
  inp.addEventListener('keydown', e => { if (e.key === 'Enter' && inp.value.trim()) submitAnswer(); });
}

function submitAnswer() {
  const v = document.getElementById('ansIn').value.trim();
  if (!v) return;
  S.myAnswer = v;
  S.state = 'waiting';
  send({ type: 'submitAnswer', answer: v });
  render();
}

/* ---- WAITING ------------------------------------------------------------- */
function waiting() {
  screen.innerHTML = `
    <div class="card">
      <div class="card-label">Round ${S.round}</div>
      <div class="q-text">${esc(S.question)}</div>
    </div>
    <div class="card center">
      <div style="font-size:28px;margin-bottom:10px">✓</div>
      <div style="font-weight:600;margin-bottom:6px">"${esc(S.myAnswer)}"</div>
      <div class="muted" style="font-size:13px">
        ${S.answered} of ${S.needed} answered
        <span class="dots"><span>.</span><span>.</span><span>.</span></span>
      </div>
    </div>
    <div class="card">${scoreboard()}</div>`;
}

/* ---- REVEALING (fullscreen dramatic, one by one) ------------------------- */
let _revealTimers = [];

function revealing() {
  // Cancel any previous timers if re-entered
  _revealTimers.forEach(clearTimeout);
  _revealTimers = [];

  const allAnswers = [];
  S.groups.forEach(g => {
    g.answers.forEach(a => allAnswers.push({ ...a, groupSize: g.ids.length }));
  });
  // Shuffle order
  for (let i = allAnswers.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [allAnswers[i], allAnswers[j]] = [allAnswers[j], allAnswers[i]];
  }

  const maxSize = S.groups.length ? Math.max(...S.groups.map(g => g.ids.length)) : 0;
  const tieExists = S.groups.filter(g => g.ids.length === maxSize).length > 1;

  // Fullscreen overlay
  screen.innerHTML = `
    <div id="revealOverlay" style="
      position:fixed;inset:0;background:var(--bg);z-index:100;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:32px;text-align:center;">
      <div id="revealQ" style="font-size:15px;color:var(--muted);
        letter-spacing:.06em;text-transform:uppercase;margin-bottom:32px;max-width:380px">
        ${esc(S.question)}
      </div>
      <div id="revealName" style="font-size:20px;font-weight:600;color:var(--muted);
        min-height:32px;margin-bottom:16px;opacity:0;transition:opacity .4s"></div>
      <div id="revealAnswer" style="font-size:48px;font-weight:800;color:var(--text);
        min-height:64px;opacity:0;transform:scale(.92);
        transition:opacity .35s ease,transform .35s ease;max-width:380px;line-height:1.2"></div>
      <div id="revealStatus" style="margin-top:28px;min-height:32px"></div>
      <div id="revealCounter" style="position:absolute;bottom:28px;
        font-size:13px;color:var(--muted)"></div>
    </div>`;

  const nameEl = document.getElementById('revealName');
  const ansEl = document.getElementById('revealAnswer');
  const statusEl = document.getElementById('revealStatus');
  const counterEl = document.getElementById('revealCounter');

  let i = 0;
  function showNext() {
    if (i >= allAnswers.length) {
      // All done — pause then go to summary
      const t = setTimeout(() => { S.state = 'summary'; summary(); }, 2000);
      _revealTimers.push(t);
      return;
    }
    const a = allAnswers[i];
    const isTop = a.groupSize === maxSize && !tieExists;
    const isSolo = a.groupSize === 1;
    counterEl.textContent = `${i + 1} / ${allAnswers.length}`;

    // Reset
    nameEl.style.opacity = '0';
    ansEl.style.opacity = '0';
    ansEl.style.transform = 'scale(.92)';
    statusEl.innerHTML = '';

    // Show name
    const t1 = setTimeout(() => {
      nameEl.textContent = `${esc(a.name)} said…`;
      nameEl.style.opacity = '1';
    }, 200);

    // Show answer after dramatic pause
    const t2 = setTimeout(() => {
      ansEl.textContent = a.answer;
      ansEl.style.opacity = '1';
      ansEl.style.transform = 'scale(1)';
      // Show status badge
      if (isTop) statusEl.innerHTML = `<span class="pill pill-ok">⭐ Matched the herd</span>`;
      else if (isSolo) statusEl.innerHTML = `<span class="pill pill-warn">🐄 Pink Cow!</span>`;
    }, 1400);

    // Next card
    const t3 = setTimeout(() => { i++; showNext(); }, 3200);

    _revealTimers.push(t1, t2, t3);
  }
  showNext();
}

/* ---- SUMMARY (groups + host merge controls, NO animation) ---------------- */
function summary() {
  // Cancel any lingering reveal timers
  _revealTimers.forEach(clearTimeout);
  _revealTimers = [];

  const maxSize = S.groups.length ? Math.max(...S.groups.map(g => g.ids.length)) : 0;
  const tieExists = S.groups.filter(g => g.ids.length === maxSize).length > 1;

  const groupsHtml = S.groups.map((g, gi) => {
    const isTop = g.ids.length === maxSize && !tieExists;
    const isSolo = g.ids.length === 1;
    return `<div class="group${isTop ? ' top' : isSolo ? ' solo-g' : ''}">
      <div class="group-head">
        ${isTop ? '⭐ ' : isSolo ? '🐄 ' : ''}${esc(g.display)}
        <span class="group-count">${g.ids.length}×</span>
      </div>
      <div class="group-entries">
        ${g.answers.map(a => `
          <div class="gentry">
            <span class="gname">${esc(a.name)}</span>
            <span class="gtext">${esc(a.answer)}</span>
            ${S.isHost ? `<button class="merge-btn${S.mergeFirst === a.playerId ? ' armed' : ''}"
              onclick="doMerge('${a.playerId}',${gi})">Merge</button>` : ''}
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');

  screen.innerHTML = `
    <div class="card">
      <div class="card-label">Round ${S.round} — Summary</div>
      <div class="q-text">${esc(S.question)}</div>
      ${tieExists ? `<div style="margin-top:12px"><span class="pill pill-muted">⚖️ Tie — no points this round</span></div>` : ''}
    </div>
    ${S.mergeFirst ? `
      <div class="merge-banner">
        Tap Merge on another answer to group with <strong>${esc(nameOf(S.mergeFirst))}</strong>
        <button onclick="S.mergeFirst=null;summary()">✕</button>
      </div>` : ''}
    <div class="card">
      <div class="groups">${groupsHtml}</div>
    </div>
    ${S.isHost ? `
      <button class="btn btn-primary" onclick="send({type:'confirmScoring'})">
        Confirm & continue →
      </button>` : `
      <div class="card center muted" style="font-size:14px">
        Waiting for host to confirm
        <span class="dots"><span>.</span><span>.</span><span>.</span></span>
      </div>`}
    <div class="card">${scoreboard()}</div>`;
}

function doMerge(playerId, groupIdx) {
  if (!S.mergeFirst) {
    S.mergeFirst = playerId;
    summary();   // re-render summary only, no animation
  } else {
    if (S.mergeFirst === playerId) { S.mergeFirst = null; summary(); return; }
    send({ type: 'mergeGroups', playerA: S.mergeFirst, playerB: playerId });
    S.mergeFirst = null;
    // Server will reply with 'reveal' — handled below
  }
}

/* ---- RESULT -------------------------------------------------------------- */
function result() {
  const r = S.lastResult;
  const myDelta = r.delta[S.myId] || 0;
  const iGotCow = r.cowWinner === S.myId;
  const iHaveCow = r.cowHolder === S.myId;

  const myPill = myDelta > 0
    ? `<span class="pill pill-ok">+1 point</span>`
    : iGotCow
      ? `<span class="pill pill-warn">🐄 You got the Pink Cow</span>`
      : r.tie
        ? `<span class="pill pill-muted">Tie — no points</span>`
        : `<span class="pill pill-muted">No match this round</span>`;

  screen.innerHTML = `
    <div class="card">
      <div class="card-label">Round ${S.round}</div>
      <div class="q-text" style="font-size:17px;padding-top:8px">${esc(r.question)}</div>
      <div style="margin-top:14px">${myPill}</div>
      ${iHaveCow && !iGotCow ? `
        <p style="font-size:13px;color:var(--warn);margin-top:10px">
          🐄 You have the Pink Cow — you can't win until someone else gives a solo answer.
        </p>` : ''}
    </div>
    <div class="card">
      <div class="card-label" style="margin-bottom:10px">
        Scores · first to ${S.winTarget}
        ${r.cowHolder ? ` · 🐄 ${nameOf(r.cowHolder)}` : ''}
      </div>
      <div class="player-list">
        ${S.players.slice().sort((a,b) => b.score - a.score).map(p => `
          <div class="p-row${p.id === S.myId ? ' me' : ''}">
            <span class="pname">${esc(p.name)}</span>
            ${p.hasCow ? `<span class="cow">🐄</span>` : ''}
            ${r.delta[p.id] ? `<span class="delta">+${r.delta[p.id]}</span>` : ''}
            <span class="pscore">${p.score}</span>
          </div>`).join('')}
      </div>
    </div>
    ${S.isHost ? `<button class="btn btn-primary" onclick="send({type:'nextQuestion'})">Next question →</button>`
      : `<div class="card center muted" style="font-size:14px">Waiting for host<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>`}`;
}

/* ---- GAMEOVER ------------------------------------------------------------ */
function gameover() {
  const r = S.lastResult;
  const winner = S.players.find(p => p.id === r.winner);
  const iWon = r.winner === S.myId;
  screen.innerHTML = `
    <div class="big">${iWon ? '🏆' : '🐄'}</div>
    <div class="card center">
      <h2>${iWon ? 'You win!' : `${esc(winner?.name || 'Someone')} wins!`}</h2>
      <p class="muted" style="font-size:14px;margin-top:6px">
        First to ${r.winTarget} — thought like the herd
      </p>
    </div>
    <div class="card">
      <div class="card-label" style="margin-bottom:10px">Final scores</div>
      <div class="player-list">
        ${S.players.slice().sort((a,b) => b.score - a.score).map(p => `
          <div class="p-row${p.id === r.winner ? ' winner' : ''}${p.id === S.myId ? ' me' : ''}">
            <span class="pname">${esc(p.name)} ${p.id === r.winner ? '🏆' : ''}</span>
            ${p.hasCow ? `<span class="cow">🐄</span>` : ''}
            <span class="pscore">${p.score}</span>
          </div>`).join('')}
      </div>
    </div>
    ${S.isHost
      ? `<button class="btn btn-dark" onclick="send({type:'newGame'})">Play again</button>`
      : `<div class="card center muted" style="font-size:14px">Waiting for host<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>`}`;
}

/* ---- helpers ---- */
function scoreboard() {
  if (!S.players.length) return '';
  return `<div class="card-label" style="margin-bottom:8px">Scores</div>
    <div class="player-list">
      ${S.players.map(p => `
        <div class="p-row${p.id === S.myId ? ' me' : ''}">
          <span class="pname">${esc(p.name)}</span>
          ${p.hasCow ? `<span class="cow">🐄</span>` : ''}
          <span class="pscore">${p.score}</span>
        </div>`).join('')}
    </div>`;
}
function nameOf(id) { return S.players.find(p => p.id === id)?.name || id; }
function esc(s) {
  return String(s || '').replace(/[&<>"']/g,
    c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

/* ---- WebSocket ----------------------------------------------------------- */
function connect(onOpen) {
  if (ws && ws.readyState !== WebSocket.CLOSED) ws.close();
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);
  ws.onopen = () => { if (!S.myId) S.myId = Math.random().toString(36).slice(2, 10); onOpen(); };
  ws.onmessage = e => { let m; try { m = JSON.parse(e.data); } catch { return; } handleMsg(m); };
  ws.onerror = () => showErr('Cannot connect to server — is it running?');
  ws.onclose = ev => {
    if (S.state === 'join') showErr('Connection closed — make sure the server is running.');
    else if (ev.code !== 1000) screen.innerHTML += `<div class="card center muted" style="margin-top:14px">Connection lost — refresh to rejoin</div>`;
  };
}
function send(msg) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(msg)); }

function handleMsg(msg) {
  switch (msg.type) {
    case 'joined':
      S.myId = msg.playerId; S.isHost = msg.isHost; S.roomCode = msg.code;
      S.players = msg.players; S.hostId = msg.hostId; S.winTarget = msg.winTarget;
      S.state = 'lobby'; render(); break;

    case 'lobbyUpdate':
      S.players = msg.players; S.hostId = msg.hostId; S.winTarget = msg.winTarget;
      if (S.state === 'lobby') render(); break;

    case 'question':
      S.question = msg.question; S.round = msg.round; S.myAnswer = '';
      S.answered = 0; S.needed = msg.players.length; S.players = msg.players;
      S.mergeFirst = null; S.revealDone = false;
      S.state = 'answering'; render(); break;

    case 'answered':
      S.answered = msg.total; S.needed = msg.needed;
      if (S.state === 'waiting') render(); break;

    case 'reveal':
      S.groups = msg.groups; S.players = msg.players; S.mergeFirst = null;
      // Already saw the reveal animation — just update the summary in place
      if (S.state === 'summary') { summary(); break; }
      S.state = 'revealing'; render(); break;

    case 'roundResult':
      S.lastResult = msg; S.players = msg.players; S.winTarget = msg.winTarget;
      S.state = msg.winner ? 'gameover' : 'result'; render(); break;

    case 'error':
      if (document.getElementById('joinErr'))
        document.getElementById('joinErr').textContent = msg.msg;
      else alert(msg.msg);
      break;
  }
}

render();
</script>
